<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart NID Helper</title>
  <style>
    :root {
      --primary: #003893;
      --primary-hover: #00286b;
      --secondary: #dc143c;
      --bg: #f8fafc;
      --text: #1e293b;
      --text-light: #64748b;
    }
    
    body {
      width: 320px;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
    }

    .header {
      background: linear-gradient(135deg, var(--primary), var(--primary-hover));
      padding: 24px 20px;
      text-align: center;
      color: white;
      border-bottom-left-radius: 20px;
      border-bottom-right-radius: 20px;
      box-shadow: 0 4px 12px rgba(0, 56, 147, 0.15);
    }

    .header img {
      width: 56px;
      height: 56px;
      margin-bottom: 12px;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
    }

    .header h1 {
      margin: 0;
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .header p {
      margin: 6px 0 0 0;
      font-size: 0.85rem;
      opacity: 0.9;
    }

    .content {
      padding: 24px 20px;
    }

    .status-card {
      background: white;
      border-radius: 12px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      margin-bottom: 24px;
      border: 1px solid #e2e8f0;
    }

    .status-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
    }

    .status-info h3 {
      margin: 0 0 4px 0;
      font-size: 0.95rem;
      color: var(--text);
    }

    .status-info p {
      margin: 0;
      font-size: 0.8rem;
      color: var(--text-light);
    }

    .ready .status-icon {
      background: #dcfce7;
      color: #16a34a;
    }

    .waiting .status-icon {
      background: #f1f5f9;
      color: #64748b;
    }

    .action-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-bottom: 12px;
      text-decoration: none;
      box-sizing: border-box;
    }

    .btn-primary {
      background-color: var(--primary);
      color: white;
      box-shadow: 0 4px 12px rgba(0, 56, 147, 0.2);
    }

    .btn-primary:hover {
      background-color: var(--primary-hover);
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(0, 56, 147, 0.3);
    }

    .btn-secondary {
      background-color: white;
      color: var(--text);
      border: 1px solid #cbd5e1;
    }

    .btn-secondary:hover {
      background-color: #f8fafc;
      border-color: #94a3b8;
    }

    .footer {
      text-align: center;
      padding: 0 20px 20px;
      font-size: 0.75rem;
      color: #94a3b8;
    }
  </style>
</head>
<body>

  <div class="header">
    <img src="icons/icon.png" alt="Logo">
    <h1>Smart NID Helper</h1>
    <p>1-Click DoNIDCR Data Transfer</p>
  </div>

  <div class="content">
    <div id="statusContainer" class="status-card waiting">
      <div class="status-icon" id="statusIcon">⚪</div>
      <div class="status-info">
        <h3 id="statusTitle">Waiting for Data</h3>
        <p id="statusDesc">No data stored in extension yet.</p>
      </div>
    </div>

    <!-- Saved Data Summary Box -->
    <div id="savedDataContainer" style="display: none; background: white; border-radius: 12px; padding: 16px; margin-bottom: 24px; border: 1px solid #e2e8f0; box-shadow: 0 2px 8px rgba(0,0,0,0.04);">
      <h4 style="margin: 0 0 12px 0; font-size: 0.9rem; color: #1e293b; display: flex; align-items: center; gap: 6px;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
        Saved Data Checkpoint
      </h4>
      <div style="font-size: 0.85rem; color: #475569; display: grid; grid-template-columns: 1fr 1fr; gap: 8px;" id="savedDataGrid">
        <!-- Populated dynamically via popup.js -->
      </div>
    </div>

    <button id="btnOpenApp" class="action-btn btn-primary">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="12" y1="18" x2="12" y2="12"></line><line x1="9" y1="15" x2="15" y2="15"></line></svg>
      Extract NID Data
    </button>
    
    <button id="btnOpenGov" class="action-btn btn-secondary">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
      Open DoNIDCR Portal
    </button>
  </div>

  <div class="footer">
    Version 1.1 • Built for Nepal
  </div>

  <script src="popup.js"></script>
</body>
</html>
